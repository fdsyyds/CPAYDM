<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth JSON 转换工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  h1 { font-size: 22px; margin-bottom: 6px; }
  .desc { color: #888; font-size: 13px; margin-bottom: 20px; }
  .container { width: 100%; max-width: 800px; }
  label { display: block; font-size: 14px; margin-bottom: 6px; color: #aaa; }
  textarea { width: 100%; height: 160px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #eee; padding: 12px; font-family: 'Fira Code', monospace; font-size: 13px; resize: vertical; }
  textarea:focus { outline: none; border-color: #0f3460; }
  .drop-zone { width: 100%; min-height: 120px; border: 2px dashed #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; margin-bottom: 16px; padding: 20px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #5dade2; background: rgba(93,173,226,0.08); }
  .drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .drop-zone .text { color: #888; font-size: 14px; }
  .drop-zone .hint { color: #555; font-size: 12px; margin-top: 4px; }
  .or { text-align: center; color: #555; font-size: 13px; margin: 12px 0; }
  .row { display: flex; gap: 12px; margin: 16px 0; align-items: center; flex-wrap: wrap; }
  select, button { padding: 8px 16px; border-radius: 6px; border: 1px solid #333; font-size: 14px; cursor: pointer; }
  select { background: #16213e; color: #eee; }
  button { background: #0f3460; color: #fff; border: none; transition: background .2s; }
  button:hover { background: #1a5276; }
  button.download { background: #1e6f50; }
  button.download:hover { background: #28a060; }
  .file-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .file-card .filename { font-size: 13px; color: #5dade2; margin-bottom: 6px; }
  .file-card pre { font-size: 12px; color: #ccc; white-space: pre-wrap; word-break: break-all; }
  .error { color: #e74c3c; font-size: 13px; margin-top: 8px; }
  .count { color: #5dade2; font-size: 13px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>Auth JSON 转换工具</h1>
  <p class="desc">将数组格式的 JSON 转换为 CLIProxyAPI 可识别的单个 JSON 文件，打包 ZIP 下载</p>

  <!-- 拖拽区域 -->
  <div class="drop-zone" id="dropZone">
    <div class="icon">📂</div>
    <div class="text">拖拽 JSON 文件到这里，或点击选择文件</div>
    <div class="hint">支持 .json 文件</div>
    <input type="file" id="fileInput" accept=".json" style="display:none" multiple>
  </div>

  <div class="or">—— 或者手动粘贴 ——</div>

  <label>粘贴你的 JSON 数组：</label>
  <textarea id="input" placeholder='[{"email":"x@gmail.com","refresh_token":"1//0e..."},...]'></textarea>

  <div class="row">
    <label style="margin:0">认证类型：</label>
    <select id="authType">
      <option value="antigravity">Antigravity</option>
      <option value="gemini">Gemini CLI</option>
      <option value="claude">Claude</option>
      <option value="codex">Codex</option>
    </select>
    <button onclick="convertFromTextarea()">转换</button>
    <button class="download" onclick="downloadZip()">下载 ZIP</button>
  </div>
  <div class="error" id="error"></div>
  <div class="count" id="count"></div>
  <div class="output-area" id="output"></div>
</div>
<script>
let results = [];
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

// 点击拖拽区域触发文件选择
dropZone.addEventListener('click', () => fileInput.click());

// 拖拽事件
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

// 文件选择事件
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  if (!fileList.length) return;
  // 读取所有文件内容后合并处理
  const readers = [];
  for (const file of fileList) {
    readers.push(new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsText(file);
    }));
  }
  Promise.all(readers).then(contents => {
    // 合并所有文件的内容
    let allItems = [];
    for (const text of contents) {
      try {
        const parsed = JSON.parse(text.trim());
        if (Array.isArray(parsed)) allItems.push(...parsed);
        else allItems.push(parsed);
      } catch (e) {
        showError('文件解析失败: ' + e.message);
        return;
      }
    }
    document.getElementById('input').value = JSON.stringify(allItems, null, 2);
    convert(allItems);
  });
}

function convertFromTextarea() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) { showError('请粘贴 JSON 或拖入文件'); return; }
  let parsed;
  try { parsed = JSON.parse(raw); } catch (e) { showError('JSON 解析失败: ' + e.message); return; }
  if (!Array.isArray(parsed)) parsed = [parsed];
  convert(parsed);
}

function convert(arr) {
  const type = document.getElementById('authType').value;
  const outEl = document.getElementById('output');
  const countEl = document.getElementById('count');
  clearMsg(); outEl.innerHTML = ''; results = [];
  countEl.textContent = '共 ' + arr.length + ' 个账号';
  arr.forEach((item, i) => {
    const obj = { type, ...item };
    const filename = (item.email ? item.email.split('@')[0] : 'account' + (i + 1)) + '.json';
    const content = JSON.stringify(obj, null, 2);
    results.push({ filename, content });
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = '<div class="filename">' + filename + '</div><pre>' + esc(content) + '</pre>';
    outEl.appendChild(card);
  });
}

function showError(msg) { document.getElementById('error').textContent = msg; }
function clearMsg() { document.getElementById('error').textContent = ''; document.getElementById('count').textContent = ''; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function downloadZip() {
  if (!results.length) convertFromTextarea();
  if (!results.length) return;
  const files = results.map(r => ({ name: r.filename, data: new TextEncoder().encode(r.content) }));
  const blob = buildZip(files);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'auths.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildZip(files) {
  const centralDir = []; let offset = 0; const parts = [];
  for (const f of files) {
    const name = new TextEncoder().encode(f.name);
    const crc = crc32(f.data);
    const lh = new Uint8Array(30 + name.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true); lv.setUint16(4, 20, true);
    lv.setUint32(14, crc, true); lv.setUint32(18, f.data.length, true);
    lv.setUint32(22, f.data.length, true); lv.setUint16(26, name.length, true);
    lh.set(name, 30);
    const cd = new Uint8Array(46 + name.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true); cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
    cv.setUint32(16, crc, true); cv.setUint32(20, f.data.length, true);
    cv.setUint32(24, f.data.length, true); cv.setUint16(28, name.length, true);
    cv.setUint32(42, offset, true); cd.set(name, 46);
    centralDir.push(cd);
    parts.push(lh, f.data);
    offset += lh.length + f.data.length;
  }
  const cdSize = centralDir.reduce((s, c) => s + c.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true); ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true); ev.setUint32(12, cdSize, true);
  ev.setUint32(16, offset, true);
  return new Blob([...parts, ...centralDir, eocd], { type: 'application/zip' });
}

function crc32(buf) {
  let table = crc32.table;
  if (!table) { table = crc32.table = new Uint32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; table[i] = c; } }
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < buf.length; i++) crc = table[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
</script>
</body>
</html>
